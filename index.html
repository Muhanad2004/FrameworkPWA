<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0a" />
  <meta name="description" content="PWA Framework" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Framework" />
  <link rel="apple-touch-icon" href="./icons/icon-apple-touch.png" />
  <link rel="manifest" href="./manifest.json" />
  <link rel="stylesheet" href="./css/app.css" />
  <title>Framework</title>
</head>
<body>
<div id="app">

  <!-- Top bar -->
  <header class="topbar">
    <span class="topbar__title">Framework</span>
    <button class="topbar__btn" id="settings-btn" aria-label="Settings">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>
  </header>

  <!-- Grid -->
  <div class="grid-wrapper">
    <div class="grid" id="grid"></div>
  </div>

  <!-- FAB -->
  <button class="fab" id="fab-btn" aria-label="Add">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
      <line x1="12" y1="5" x2="12" y2="19"/>
      <line x1="5" y1="12" x2="19" y2="12"/>
    </svg>
  </button>

  <!-- Add sheet -->
  <div class="sheet" id="add-sheet" role="dialog" aria-modal="true">
    <div class="sheet__handle"></div>
    <button class="sheet__item" id="add-note-btn">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14,2 14,8 20,8"/>
        <line x1="16" y1="13" x2="8" y2="13"/>
        <line x1="16" y1="17" x2="8" y2="17"/>
      </svg>
      New Note
    </button>
    <button class="sheet__item" id="add-image-btn">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
        <circle cx="8.5" cy="8.5" r="1.5"/>
        <polyline points="21,15 16,10 5,21"/>
      </svg>
      Add Image
    </button>
  </div>

  <!-- Settings sheet -->
  <div class="sheet" id="settings-sheet" role="dialog" aria-modal="true">
    <div class="sheet__handle"></div>
    <p class="sheet__heading">Appearance</p>
    <div class="sheet__row">
      <span class="sheet__row-label">Light Mode</span>
      <label class="toggle" aria-label="Toggle light mode">
        <input type="checkbox" id="theme-toggle" />
        <span class="toggle__track"></span>
      </label>
    </div>
    <p class="sheet__heading">Data</p>
    <button class="sheet__item sheet__item--danger" id="reset-btn">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="1,4 1,10 7,10"/>
        <path d="M3.51 15a9 9 0 1 0 .49-3.51"/>
      </svg>
      Reset Everything
    </button>
  </div>

  <!-- Note editor -->
  <div class="screen" id="editor" role="dialog" aria-modal="true">
    <header class="screen__bar">
      <button class="screen__btn" id="editor-back" aria-label="Back">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15,18 9,12 15,6"/>
        </svg>
      </button>
      <input class="screen__title-input" id="editor-title" type="text" placeholder="Title" autocorrect="off" autocapitalize="words" spellcheck="false" />
      <button class="screen__btn screen__btn--danger" id="editor-delete" aria-label="Delete">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="3,6 5,6 21,6"/>
          <path d="M19,6v14a2,2 0 0,1-2,2H7a2,2 0 0,1-2-2V6m3,0V4a2,2 0 0,1 2-2h4a2,2 0 0,1 2,2v2"/>
        </svg>
      </button>
    </header>
    <textarea class="screen__pad" id="editor-pad" placeholder="Start writing…" spellcheck="true" autocorrect="on" autocapitalize="sentences"></textarea>
  </div>

  <!-- Image viewer -->
  <div class="screen" id="viewer" role="dialog" aria-modal="true">
    <header class="screen__bar">
      <button class="screen__btn" id="viewer-back" aria-label="Back">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15,18 9,12 15,6"/>
        </svg>
      </button>
      <input class="screen__title-input" id="viewer-title" type="text" placeholder="Name" autocorrect="off" autocapitalize="words" spellcheck="false" />
      <button class="screen__btn screen__btn--danger" id="viewer-delete" aria-label="Delete">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="3,6 5,6 21,6"/>
          <path d="M19,6v14a2,2 0 0,1-2,2H7a2,2 0 0,1-2-2V6m3,0V4a2,2 0 0,1 2-2h4a2,2 0 0,1 2,2v2"/>
        </svg>
      </button>
    </header>
    <div class="viewer__content">
      <img class="viewer__img" id="viewer-img" alt="" />
    </div>
  </div>

  <!-- Hidden file input -->
  <input type="file" id="file-input" accept="image/*" style="display:none" />

  <!-- Backdrop -->
  <div class="backdrop" id="backdrop"></div>

</div>
<script src="./js/db.js" defer></script>
<script src="./js/app.js" defer></script>
</body>
</html>
